<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game - Pool Scoreboard</title>
    <meta name="description" content="Track your pool game">
    <meta name="author" content="Yvan Rouxel">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        html {
            background: #667eea;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        .game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }
        
        .game-info {
            flex: 1;
            text-align: center;
        }
        
        .game-type {
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .race-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 2px;
        }
        
        .end-game-btn {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .end-game-btn:active {
            background: rgba(255, 255, 255, 0.35);
        }
        
        .footer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }
        
        .rack-number {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .players-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 12px;
            position: relative;
            background: #c62828;
            overflow: hidden;
        }
        
        .player-section.breaking {
            background: #b71c1c;
            box-shadow: inset 0 0 20px rgba(255, 193, 7, 0.15);
        }
        
        .player-section:first-child {
            border-bottom: 4px solid #1a1a1a;
            background: #1565c0;
        }
        
        .player-section:first-child.breaking {
            background: #0d47a1;
            box-shadow: inset 0 0 20px rgba(255, 193, 7, 0.15);
        }
        
        .player-name {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }
        
        .break-indicator {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffc107;
            color: #000;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.6);
            display: none;
            align-items: center;
            gap: 6px;
            animation: breakPulse 2s ease-in-out infinite;
            border: 2px solid #000;
        }
        
        .break-indicator.active {
            display: flex;
        }
        
        @keyframes breakPulse {
            0%, 100% {
                transform: scale(1) translateX(-50%);
                box-shadow: 0 4px 12px rgba(255, 193, 7, 0.6);
            }
            50% {
                transform: scale(1.05) translateX(-50%);
                box-shadow: 0 6px 20px rgba(255, 193, 7, 0.9);
            }
        }
        
        .score-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            gap: 30px;
        }
        
        .rack-points-control {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .rack-points-control.show {
            display: flex;
        }
        
        .rack-points-display {
            font-size: 60px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1;
            user-select: none;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        
        .rack-point-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 24px;
            color: #ffffff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .rack-point-btn:active {
            transform: scale(0.95);
            background: rgba(0, 0, 0, 0.5);
        }
        
        .score-display-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .score-display-wrapper:active {
            transform: scale(0.98);
        }
        
        .score-display {
            font-size: 140px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            user-select: none;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
        }
        
        .score-adjusters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 20px;
        }
        
        .score-btn {
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            color: #ffffff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .score-btn:active {
            transform: scale(0.95);
            background: rgba(0, 0, 0, 0.5);
        }
        
        .score-down:active {
            transform: scale(0.95);
        }
        
        @media (orientation: landscape) and (min-width: 600px) {
            .players-container {
                flex-direction: row;
            }
            
            .player-section:first-child {
                border-bottom: none;
                border-right: 4px solid #1a1a1a;
            }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            margin: 16px;
        }
        
        .winner-emoji {
            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .winner-text {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .winner-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .modal-btn-secondary {
            background: #e5e5e5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="game-info">
                <div class="game-type" id="gameType">8-Ball</div>
                <div class="race-info" id="raceInfo">Race to 5 • Alternate Break</div>
            </div>
            <button class="end-game-btn" onclick="confirmEndGame()">End Game</button>
        </div>
        
        <div class="players-container">
            <div class="player-section" id="player1Section">
                <div class="player-name" id="player1Name">Player 1</div>
                <div class="break-indicator" id="break1"></div>
                <div class="score-controls">
                    <div class="rack-points-control" id="rackPoints1Control">
                        <button class="rack-point-btn" onclick="adjustRackPoints(1, 1);">+</button>
                        <div class="rack-points-display" id="rackPoints1">0</div>
                        <button class="rack-point-btn" onclick="adjustRackPoints(1, -1);">−</button>
                    </div>
                    <div class="score-display-wrapper" onclick="incrementScore(1)">
                        <div class="score-display" id="score1">0</div>
                    </div>
                    <div class="score-adjusters">
                        <button class="score-btn" onclick="adjustScore(1, 1); event.stopPropagation();">+</button>
                        <button class="score-btn" onclick="adjustScore(1, -1); event.stopPropagation();">−</button>
                    </div>
                </div>
            </div>
            
            <div class="player-section" id="player2Section">
                <div class="player-name" id="player2Name">Player 2</div>
                <div class="break-indicator" id="break2"></div>
                <div class="score-controls">
                    <div class="rack-points-control" id="rackPoints2Control">
                        <button class="rack-point-btn" onclick="adjustRackPoints(2, 1);">+</button>
                        <div class="rack-points-display" id="rackPoints2">0</div>
                        <button class="rack-point-btn" onclick="adjustRackPoints(2, -1);">−</button>
                    </div>
                    <div class="score-display-wrapper" onclick="incrementScore(2)">
                        <div class="score-display" id="score2">0</div>
                    </div>
                    <div class="score-adjusters">
                        <button class="score-btn" onclick="adjustScore(2, 1); event.stopPropagation();">+</button>
                        <button class="score-btn" onclick="adjustScore(2, -1); event.stopPropagation();">−</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="rack-number" id="rackNumber">Rack 1</div>
        </div>
    </div>
    
    <div class="modal" id="winnerModal">
        <div class="modal-content">
            <div class="winner-emoji">🏆</div>
            <div class="winner-text" id="winnerText">Player 1 Wins!</div>
            <div class="winner-subtitle" id="winnerScore">7 - 3</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="window.location.href='index.html'">Home</button>
                <button class="modal-btn modal-btn-primary" onclick="window.location.href='new-game.html'">New Game</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="endGameModal">
        <div class="modal-content">
            <div class="winner-emoji">⚠️</div>
            <div class="winner-text">End Game?</div>
            <div class="winner-subtitle">Are you sure you want to end this game?</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeEndGameModal()">Cancel</button>
                <button class="modal-btn modal-btn-primary" onclick="endGameConfirmed()">End Game</button>
            </div>
        </div>
    </div>
    
    <script>
        let gameData = JSON.parse(localStorage.getItem('currentGame'));
        
        if (!gameData) {
            window.location.href = 'new-game.html';
        }
        
        // Initialize display
        const gameTypeNames = {
            '8ball': '8-Ball',
            '9ball': '9-Ball',
            '10ball': '10-Ball',
            '141': '14.1',
            'bank': 'Bank Pool',
            'onepocket': 'One Pocket'
        };
        
        document.getElementById('gameType').textContent = gameTypeNames[gameData.gameType] || gameData.gameType;
        document.getElementById('player1Name').textContent = gameData.player1;
        document.getElementById('player2Name').textContent = gameData.player2;
        document.getElementById('score1').textContent = gameData.score1;
        document.getElementById('score2').textContent = gameData.score2;
        
        const raceText = gameData.raceTo === 'open' ? 'Open Race' : `Race to ${gameData.raceTo}`;
        const breakText = gameData.breakRule === 'alternate' ? 'Alternate Break' : 'Winner Breaks';
        document.getElementById('raceInfo').textContent = `${raceText} • ${breakText}`;
        
        // Show rack points if applicable
        if (gameData.pointsPerRack) {
            document.getElementById('rackPoints1Control').classList.add('show');
            document.getElementById('rackPoints2Control').classList.add('show');
            document.getElementById('rackPoints1').textContent = gameData.rackPoints1 || 0;
            document.getElementById('rackPoints2').textContent = gameData.rackPoints2 || 0;
        }
        
        updateBreakIndicator();
        
        function updateBreakIndicator() {
            const break1 = document.getElementById('break1');
            const break2 = document.getElementById('break2');
            const section1 = document.getElementById('player1Section');
            const section2 = document.getElementById('player2Section');
            
            if (gameData.currentBreaker === 1) {
                break1.innerHTML = '🎱 <span>Breaking</span>';
                break1.classList.add('active');
                break2.classList.remove('active');
                section1.classList.add('breaking');
                section2.classList.remove('breaking');
            } else {
                break2.innerHTML = '🎱 <span>Breaking</span>';
                break2.classList.add('active');
                break1.classList.remove('active');
                section1.classList.remove('breaking');
                section2.classList.add('breaking');
            }
            
            updateRackNumber();
        }
        
        function updateRackNumber() {
            const totalRacks = gameData.score1 + gameData.score2 + 1;
            document.getElementById('rackNumber').textContent = `Rack ${totalRacks}`;
        }
        
        function incrementScore(player) {
            if (player === 1) {
                gameData.score1++;
                document.getElementById('score1').textContent = gameData.score1;
                
                if (gameData.breakRule === 'winner') {
                    gameData.currentBreaker = 1;
                    gameData.breaksInSet = 0;
                } else {
                    // Alternate break with break set
                    gameData.breaksInSet = (gameData.breaksInSet || 0) + 1;
                    
                    if (gameData.breaksInSet >= (gameData.breakSet || 1)) {
                        gameData.currentBreaker = gameData.currentBreaker === 1 ? 2 : 1;
                        gameData.breaksInSet = 0;
                    }
                }
            } else {
                gameData.score2++;
                document.getElementById('score2').textContent = gameData.score2;
                
                if (gameData.breakRule === 'winner') {
                    gameData.currentBreaker = 2;
                    gameData.breaksInSet = 0;
                } else {
                    // Alternate break with break set
                    gameData.breaksInSet = (gameData.breaksInSet || 0) + 1;
                    
                    if (gameData.breaksInSet >= (gameData.breakSet || 1)) {
                        gameData.currentBreaker = gameData.currentBreaker === 1 ? 2 : 1;
                        gameData.breaksInSet = 0;
                    }
                }
            }
            
            updateBreakIndicator();
            localStorage.setItem('currentGame', JSON.stringify(gameData));
            
            checkWinner();
        }
        
        function adjustScore(player, amount) {
            if (player === 1) {
                gameData.score1 = Math.max(0, gameData.score1 + amount);
                document.getElementById('score1').textContent = gameData.score1;
            } else {
                gameData.score2 = Math.max(0, gameData.score2 + amount);
                document.getElementById('score2').textContent = gameData.score2;
            }
            
            updateRackNumber();
            localStorage.setItem('currentGame', JSON.stringify(gameData));
        }
        
        function adjustRackPoints(player, amount) {
            if (!gameData.pointsPerRack) return;
            
            if (player === 1) {
                gameData.rackPoints1 = Math.max(0, gameData.rackPoints1 + amount);
                document.getElementById('rackPoints1').textContent = gameData.rackPoints1;
                
                // Check if rack is won
                if (gameData.rackPoints1 >= gameData.pointsPerRack) {
                    gameData.score1++;
                    document.getElementById('score1').textContent = gameData.score1;
                    gameData.rackPoints1 = 0;
                    gameData.rackPoints2 = 0;
                    document.getElementById('rackPoints1').textContent = 0;
                    document.getElementById('rackPoints2').textContent = 0;
                    
                    // Update breaker
                    if (gameData.breakRule === 'winner') {
                        gameData.currentBreaker = 1;
                        gameData.breaksInSet = 0;
                    } else {
                        // Alternate break with break set
                        gameData.breaksInSet = (gameData.breaksInSet || 0) + 1;
                        
                        if (gameData.breaksInSet >= (gameData.breakSet || 1)) {
                            gameData.currentBreaker = gameData.currentBreaker === 1 ? 2 : 1;
                            gameData.breaksInSet = 0;
                        }
                    }
                    updateBreakIndicator();
                    checkWinner();
                }
            } else {
                gameData.rackPoints2 = Math.max(0, gameData.rackPoints2 + amount);
                document.getElementById('rackPoints2').textContent = gameData.rackPoints2;
                
                // Check if rack is won
                if (gameData.rackPoints2 >= gameData.pointsPerRack) {
                    gameData.score2++;
                    document.getElementById('score2').textContent = gameData.score2;
                    gameData.rackPoints1 = 0;
                    gameData.rackPoints2 = 0;
                    document.getElementById('rackPoints1').textContent = 0;
                    document.getElementById('rackPoints2').textContent = 0;
                    
                    // Update breaker
                    if (gameData.breakRule === 'winner') {
                        gameData.currentBreaker = 2;
                        gameData.breaksInSet = 0;
                    } else {
                        // Alternate break with break set
                        gameData.breaksInSet = (gameData.breaksInSet || 0) + 1;
                        
                        if (gameData.breaksInSet >= (gameData.breakSet || 1)) {
                            gameData.currentBreaker = gameData.currentBreaker === 1 ? 2 : 1;
                            gameData.breaksInSet = 0;
                        }
                    }
                    updateBreakIndicator();
                    checkWinner();
                }
            }
            
            localStorage.setItem('currentGame', JSON.stringify(gameData));
        }
        
        function checkWinner() {
            if (gameData.raceTo === 'open') return;
            
            const target = parseInt(gameData.raceTo);
            if (gameData.score1 >= target) {
                showWinner(1);
            } else if (gameData.score2 >= target) {
                showWinner(2);
            }
        }
        
        function showWinner(player) {
            const winner = player === 1 ? gameData.player1 : gameData.player2;
            document.getElementById('winnerText').textContent = `${winner} Wins!`;
            document.getElementById('winnerScore').textContent = `${gameData.score1} - ${gameData.score2}`;
            document.getElementById('winnerModal').classList.add('show');
            
            saveToHistory();
        }
        
        function confirmEndGame() {
            document.getElementById('endGameModal').classList.add('show');
        }
        
        function closeEndGameModal() {
            document.getElementById('endGameModal').classList.remove('show');
        }
        
        function endGameConfirmed() {
            saveToHistory();
            window.location.href = 'index.html';
        }
        
        function saveToHistory() {
            const history = JSON.parse(localStorage.getItem('gameHistory') || '[]');
            gameData.endTime = new Date().toISOString();
            history.unshift(gameData);
            
            // Keep only last 50 games
            if (history.length > 50) {
                history.pop();
            }
            
            localStorage.setItem('gameHistory', JSON.stringify(history));
            localStorage.removeItem('currentGame');
        }
    </script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
