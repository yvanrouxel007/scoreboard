<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game History - Pool Scoreboard</title>
    <meta name="description" content="View your past pool games">
    <meta name="author" content="Yvan Rouxel">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        html {
            background: #667eea;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }
        
        .back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.2s;
        }
        
        .back-button:active {
            transform: scale(0.95);
            background: #764ba2;
        }
        
        h1 {
            color: #1a1a1a;
            text-align: center;
            font-size: 22px;
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .clear-history-btn {
            display: block;
            margin: 0 auto 16px;
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .game-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #e5e5e5;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .game-type-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .game-date {
            font-size: 13px;
            color: #666;
        }
        
        .game-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-info {
            flex: 1;
            text-align: center;
        }
        
        .player-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .player-name.winner {
            color: #667eea;
            font-weight: 700;
        }
        
        .score {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }
        
        .score.winner {
            color: #667eea;
        }
        
        .vs {
            font-size: 16px;
            color: #999;
            padding: 0 12px;
        }
        
        .game-meta {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e5e5;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .start-playing-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            margin: 16px;
        }
        
        .modal-emoji {
            font-size: 80px;
            margin-bottom: 16px;
        }
        
        .modal-text {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .modal-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn-primary {
            background: #dc3545;
            color: white;
        }
        
        .modal-btn-secondary {
            background: #e5e5e5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="window.location.href='index.html'">←</button>
        
        <h1>Game History</h1>
        
        <div id="historyContent"></div>
    </div>
    
    <div class="modal" id="clearModal">
        <div class="modal-content">
            <div class="modal-emoji">⚠️</div>
            <div class="modal-text">Clear History?</div>
            <div class="modal-subtitle">Are you sure you want to clear all game history? This cannot be undone.</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeClearModal()">Cancel</button>
                <button class="modal-btn modal-btn-primary" onclick="confirmClearHistory()">Clear All</button>
            </div>
        </div>
    </div>
    
    <script>
        const history = JSON.parse(localStorage.getItem('gameHistory') || '[]');
        
        const gameTypeNames = {
            '8ball': '8-Ball',
            '9ball': '9-Ball',
            '10ball': '10-Ball',
            '141': '14.1',
            'bank': 'Bank Pool',
            'onepocket': 'One Pocket'
        };
        
        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function renderHistory() {
            const container = document.getElementById('historyContent');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">No games played yet</div>
                        <button class="start-playing-btn" onclick="window.location.href='new-game.html'">
                            Start Your First Game
                        </button>
                    </div>
                `;
                return;
            }
            
            let html = '<button class="clear-history-btn" onclick="clearHistory()">Clear All History</button>';
            
            history.forEach(game => {
                const winner = game.score1 > game.score2 ? 1 : (game.score2 > game.score1 ? 2 : 0);
                const raceText = game.raceTo === 'open' ? 'Open' : `Race ${game.raceTo}`;
                const breakText = game.breakRule === 'alternate' ? 'Alt Break' : 'Winner Breaks';
                
                html += `
                    <div class="game-card">
                        <div class="game-header">
                            <span class="game-type-badge">${gameTypeNames[game.gameType]}</span>
                            <span class="game-date">${formatDate(game.startTime)}</span>
                        </div>
                        <div class="game-details">
                            <div class="player-info">
                                <div class="player-name ${winner === 1 ? 'winner' : ''}">${game.player1}</div>
                                <div class="score ${winner === 1 ? 'winner' : ''}">${game.score1}</div>
                            </div>
                            <div class="vs">-</div>
                            <div class="player-info">
                                <div class="player-name ${winner === 2 ? 'winner' : ''}">${game.player2}</div>
                                <div class="score ${winner === 2 ? 'winner' : ''}">${game.score2}</div>
                            </div>
                        </div>
                        <div class="game-meta">${raceText} • ${breakText}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function clearHistory() {
            document.getElementById('clearModal').classList.add('show');
        }
        
        function closeClearModal() {
            document.getElementById('clearModal').classList.remove('show');
        }
        
        function confirmClearHistory() {
            localStorage.removeItem('gameHistory');
            window.location.reload();
        }
        
        renderHistory();
    </script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
