<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Game - Pool Scoreboard</title>
    <meta name="description" content="Set up a new pool game">
    <meta name="author" content="Yvan Rouxel">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }
        
        .back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.2s;
        }
        
        .back-button:active {
            transform: scale(0.95);
            background: #764ba2;
        }
        
        h1 {
            color: #1a1a1a;
            text-align: center;
            font-size: 22px;
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .form-group {
            margin-bottom: 14px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: white;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .game-types {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .game-type-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .game-type-btn.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .game-type-btn:active {
            transform: scale(0.98);
        }
        
        .race-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .race-btn {
            padding: 10px 16px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: 56px;
        }
        
        .race-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .race-btn:active {
            transform: scale(0.98);
        }
        
        .break-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .break-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .break-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .break-btn:active {
            transform: scale(0.98);
        }
        
        .start-button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            transition: all 0.2s;
        }
        
        .start-button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .start-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .section-title {
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="window.location.href='index.html'">←</button>
        
        <h1>New Game Setup</h1>
        
        <div class="form-group">
            <label>Player 1 / Team 1 Name</label>
            <input type="text" id="player1" placeholder="Enter name" value="Player 1">
        </div>
        
        <div class="form-group">
            <label>Player 2 / Team 2 Name</label>
            <input type="text" id="player2" placeholder="Enter name" value="Player 2">
        </div>
        
        <div class="section-title">Game Type</div>
        <div class="game-types">
            <button class="game-type-btn selected" data-game="8ball">8-Ball</button>
            <button class="game-type-btn" data-game="9ball">9-Ball</button>
            <button class="game-type-btn" data-game="10ball">10-Ball</button>
            <button class="game-type-btn" data-game="141">14.1</button>
            <button class="game-type-btn" data-game="bank">Bank Pool</button>
            <button class="game-type-btn" data-game="onepocket">One Pocket</button>
        </div>
        
        <div class="section-title">Race To</div>
        <div class="race-options">
            <button class="race-btn" data-race="3">3</button>
            <button class="race-btn" data-race="5">5</button>
            <button class="race-btn" data-race="7">7</button>
            <button class="race-btn" data-race="9">9</button>
            <button class="race-btn" data-race="11">11</button>
            <button class="race-btn selected" data-race="open">Open</button>
        </div>
        
        <div class="section-title">Break Rule</div>
        <div class="break-options">
            <button class="break-btn selected" data-break="alternate">Alternate Break</button>
            <button class="break-btn" data-break="winner">Winner Breaks</button>
        </div>
        
        <button class="start-button" onclick="startGame()">Start Game</button>
    </div>
    
    <script>
        // Game type selection
        document.querySelectorAll('.game-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.game-type-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        
        // Race to selection
        document.querySelectorAll('.race-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        
        // Break rule selection
        document.querySelectorAll('.break-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.break-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        
        function startGame() {
            const player1 = document.getElementById('player1').value.trim() || 'Player 1';
            const player2 = document.getElementById('player2').value.trim() || 'Player 2';
            const gameType = document.querySelector('.game-type-btn.selected').dataset.game;
            const raceTo = document.querySelector('.race-btn.selected').dataset.race;
            const breakRule = document.querySelector('.break-btn.selected').dataset.break;
            
            const gameData = {
                player1,
                player2,
                gameType,
                raceTo,
                breakRule,
                score1: 0,
                score2: 0,
                currentBreaker: 1,
                startTime: new Date().toISOString()
            };
            
            localStorage.setItem('currentGame', JSON.stringify(gameData));
            window.location.href = 'game.html';
        }
    </script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
