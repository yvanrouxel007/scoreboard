<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Game - Pool Scoreboard</title>
    <meta name="description" content="Set up a new pool game">
    <meta name="author" content="Yvan Rouxel">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        html {
            background: #667eea;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom, 20px) + 80px);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }
        
        .back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.2s;
        }
        
        .back-button:active {
            transform: scale(0.95);
            background: #764ba2;
        }
        
        h1 {
            color: #1a1a1a;
            text-align: center;
            font-size: 22px;
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .form-group {
            margin-bottom: 14px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: white;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .game-types {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .game-type-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .game-type-btn.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .game-type-btn:active {
            transform: scale(0.98);
        }
        
        .race-to-container {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        
        .race-to-input-wrapper {
            flex: 1;
            position: relative;
            cursor: text;
        }
        
        .race-to-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: white;
            text-align: center;
            font-weight: 600;
        }
        
        .race-to-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .race-to-input:disabled {
            background: #f5f5f5;
            color: #999;
            pointer-events: none;
        }
        
        .open-btn {
            padding: 12px 20px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        .open-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .open-btn:active {
            transform: scale(0.98);
        }
        
        .points-per-rack-group {
            display: none;
        }
        
        .points-per-rack-group.show {
            display: block;
        }
        
        .points-per-rack-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            background: white;
            text-align: center;
            font-weight: 600;
        }
        
        .points-per-rack-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .break-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .break-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .break-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .break-btn:active {
            transform: scale(0.98);
        }
        
        .bank-pool-variant-group {
            display: none;
        }
        
        .bank-pool-variant-group.show {
            display: block;
        }
        
        .variant-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .variant-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .variant-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .variant-btn:active {
            transform: scale(0.98);
        }
        
        .break-set-group {
            display: none;
            margin-top: 12px;
        }
        
        .break-set-group.show {
            display: block;
        }
        
        .break-set-group.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .break-set-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .break-set-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .break-set-btn {
            padding: 10px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .break-set-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .break-set-btn:active {
            transform: scale(0.98);
        }
        
        .first-break-btn {
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        
        .first-break-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .first-break-btn:active {
            transform: scale(0.98);
        }
        
        .start-button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            transition: all 0.2s;
        }
        
        .start-button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .start-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .section-title {
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="window.location.href='index.html'">←</button>
        
        <h1>New Game Setup</h1>
        
        <div class="form-group">
            <label>Player 1 / Team 1 Name</label>
            <input type="text" id="player1" placeholder="Enter name" value="Player 1">
        </div>
        
        <div class="form-group">
            <label>Player 2 / Team 2 Name</label>
            <input type="text" id="player2" placeholder="Enter name" value="Player 2">
        </div>
        
        <div class="section-title">Game Type</div>
        <div class="game-types">
            <button class="game-type-btn selected" data-game="8ball">8-Ball</button>
            <button class="game-type-btn" data-game="9ball">9-Ball</button>
            <button class="game-type-btn" data-game="10ball">10-Ball</button>
            <button class="game-type-btn" data-game="141">14.1</button>
            <button class="game-type-btn" data-game="bank">Bank Pool</button>
            <button class="game-type-btn" data-game="onepocket">One Pocket</button>
        </div>
        
        <div class="section-title">Race To</div>
        <div class="race-to-container">
            <div class="race-to-input-wrapper" onclick="enableRaceInput()">
                <input type="number" id="raceTo" class="race-to-input" placeholder="Enter racks" min="1" step="1">
            </div>
            <button class="open-btn" id="openBtn" onclick="toggleOpen()">Open</button>
        </div>
        
        <div class="bank-pool-variant-group" id="bankPoolVariantGroup">
            <div class="section-title">Variant</div>
            <div class="variant-options">
                <button class="variant-btn selected" data-variant="9ball">9-Ball (First to 5)</button>
                <button class="variant-btn" data-variant="15ball">15-Ball (First to 8)</button>
            </div>
        </div>
        
        <div class="points-per-rack-group" id="pointsPerRackGroup">
            <div class="section-title">Points per Rack</div>
            <input type="number" id="pointsPerRack" class="points-per-rack-input" placeholder="Enter points" min="1" step="1" value="">
        </div>
        
        <div class="section-title">Break Rule</div>
        <div class="break-options">
            <button class="break-btn selected" data-break="alternate">Alternate Break</button>
            <button class="break-btn" data-break="winner">Winner Breaks</button>
        </div>
        
        <div class="break-set-group show" id="breakSetGroup">
            <div class="break-set-label">Breaks per Set</div>
            <div class="break-set-options">
                <button class="break-set-btn selected" data-set="1">1</button>
                <button class="break-set-btn" data-set="2">2</button>
                <button class="break-set-btn" data-set="3">3</button>
            </div>
        </div>
        
        <div class="section-title">First Break</div>
        <div class="break-options">
            <button class="first-break-btn selected" data-breaker="1" id="firstBreakP1">Player 1</button>
            <button class="first-break-btn" data-breaker="2" id="firstBreakP2">Player 2</button>
        </div>
        
        <button class="start-button" onclick="startGame()">Start Game</button>
    </div>
    
    <script>
        // Game type selection
        document.querySelectorAll('.game-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.game-type-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updatePointsPerRackVisibility();
            });
        });
        
        // Show/hide points per rack based on game type
        function updatePointsPerRackVisibility() {
            const gameType = document.querySelector('.game-type-btn.selected').dataset.game;
            const pointsGroup = document.getElementById('pointsPerRackGroup');
            const pointsInput = document.getElementById('pointsPerRack');
            const variantGroup = document.getElementById('bankPoolVariantGroup');
            
            if (gameType === '141') {
                // 14.1: Show Points per Rack input, hide variant
                pointsGroup.classList.add('show');
                pointsInput.disabled = false;
                pointsInput.value = 100;
                variantGroup.classList.remove('show');
            } else if (gameType === 'bank') {
                // Bank Pool: Show variant selector, hide Points per Rack input
                variantGroup.classList.add('show');
                pointsGroup.classList.remove('show');
                updateBankPoolPoints();
            } else if (gameType === 'onepocket') {
                // One Pocket: Fixed at 8 points, hide input
                pointsInput.value = 8;
                pointsGroup.classList.remove('show');
                variantGroup.classList.remove('show');
            } else {
                // Other games: Hide both
                pointsGroup.classList.remove('show');
                pointsInput.value = '';
                variantGroup.classList.remove('show');
            }
        }
        
        function updateBankPoolPoints() {
            const variant = document.querySelector('.variant-btn.selected')?.dataset.variant || '9ball';
            const pointsInput = document.getElementById('pointsPerRack');
            
            if (variant === '9ball') {
                pointsInput.value = 5;
            } else if (variant === '15ball') {
                pointsInput.value = 8;
            }
        }
        
        // Toggle open race button
        function toggleOpen() {
            const openBtn = document.getElementById('openBtn');
            const raceInput = document.getElementById('raceTo');
            
            if (openBtn.classList.contains('selected')) {
                openBtn.classList.remove('selected');
                raceInput.disabled = false;
                raceInput.focus();
            } else {
                openBtn.classList.add('selected');
                raceInput.disabled = true;
                raceInput.value = '';
            }
        }
        
        // Enable race input and deselect open button
        function enableRaceInput() {
            const openBtn = document.getElementById('openBtn');
            const raceInput = document.getElementById('raceTo');
            
            if (openBtn.classList.contains('selected')) {
                openBtn.classList.remove('selected');
            }
            raceInput.disabled = false;
            raceInput.focus();
        }
        
        // Toggle open race checkbox
        function toggleOpenRace() {
            const openCheckbox = document.getElementById('openRace');
            const raceInput = document.getElementById('raceTo');
            if (openCheckbox.checked) {
                raceInput.disabled = true;
                raceInput.value = '';
            } else {
                raceInput.disabled = false;
            }
        }
        
        // Break rule selection
        document.querySelectorAll('.break-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.break-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updateBreakSetVisibility();
            });
        });
        
        // Break set selection
        document.querySelectorAll('.break-set-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.break-set-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        
        // Bank Pool variant selection
        document.querySelectorAll('.variant-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updateBankPoolPoints();
            });
        });
        
        // Show/hide break set options based on break rule
        function updateBreakSetVisibility() {
            const breakRule = document.querySelector('.break-btn.selected').dataset.break;
            const breakSetGroup = document.getElementById('breakSetGroup');
            
            if (breakRule === 'alternate') {
                breakSetGroup.classList.add('show');
                breakSetGroup.classList.remove('disabled');
            } else {
                breakSetGroup.classList.add('disabled');
            }
        }
        
        // Initialize break set visibility
        updateBreakSetVisibility();
        
        // First break selection
        document.querySelectorAll('.first-break-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.first-break-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        
        // Update first break button labels when player names change
        function updateFirstBreakLabels() {
            const p1Name = document.getElementById('player1').value.trim() || 'Player 1';
            const p2Name = document.getElementById('player2').value.trim() || 'Player 2';
            document.getElementById('firstBreakP1').textContent = p1Name;
            document.getElementById('firstBreakP2').textContent = p2Name;
        }
        
        document.getElementById('player1').addEventListener('input', updateFirstBreakLabels);
        document.getElementById('player2').addEventListener('input', updateFirstBreakLabels);
        
        function startGame() {
            const player1 = document.getElementById('player1').value.trim() || 'Player 1';
            const player2 = document.getElementById('player2').value.trim() || 'Player 2';
            const gameType = document.querySelector('.game-type-btn.selected').dataset.game;
            const openBtn = document.getElementById('openBtn');
            const raceToInput = document.getElementById('raceTo').value;
            const raceTo = openBtn.classList.contains('selected') ? 'open' : (raceToInput || 'open');
            const breakRule = document.querySelector('.break-btn.selected').dataset.break;
            const breakSet = parseInt(document.querySelector('.break-set-btn.selected').dataset.set);
            const firstBreaker = parseInt(document.querySelector('.first-break-btn.selected').dataset.breaker);
            const pointsPerRack = document.getElementById('pointsPerRack').value || null;
            const bankPoolVariant = document.querySelector('.variant-btn.selected')?.dataset.variant || null;
            
            const gameData = {
                player1,
                player2,
                gameType,
                raceTo,
                breakRule,
                breakSet,
                score1: 0,
                score2: 0,
                currentBreaker: firstBreaker,
                breaksInSet: 0,
                pointsPerRack: pointsPerRack ? parseInt(pointsPerRack) : null,
                bankPoolVariant: bankPoolVariant,
                rackPoints1: 0,
                rackPoints2: 0,
                startTime: new Date().toISOString()
            };
            
            localStorage.setItem('currentGame', JSON.stringify(gameData));
            window.location.href = 'game.html';
        }
    </script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
